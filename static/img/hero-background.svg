<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3443" />
      <stop offset="100%" stop-color="#34e89e" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50c9c3" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#96deda" stop-opacity="0.7" />
    </linearGradient>
    <filter id="blurEffect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- Decorative elements -->
  <circle cx="300" cy="200" r="180" fill="url(#circleGradient)" filter="url(#blurEffect)" />
  <circle cx="900" cy="400" r="150" fill="url(#circleGradient)" filter="url(#blurEffect)" />
  
  <!-- E-waste recycling symbols -->
  <g transform="translate(600, 300)" fill="white" opacity="0.9">
    <!-- Recycle Symbol -->
    <g transform="scale(2.5)">
      <path d="M0,0 L0,-25 A25,25 0 0,1 21.65,-12.5 L7.5,-4.33 Z" />
      <path d="M0,0 L21.65,-12.5 A25,25 0 0,1 21.65,12.5 L7.5,4.33 Z" />
      <path d="M0,0 L0,25 A25,25 0 0,1 -21.65,12.5 L-7.5,4.33 Z" />
      <path d="M0,0 L-21.65,12.5 A25,25 0 0,1 -21.65,-12.5 L-7.5,-4.33 Z" />
    </g>
  </g>
  
  <!-- Electronic device outlines -->
  <g stroke="white" stroke-width="3" fill="none" opacity="0.8">
    <!-- Smartphone -->
    <rect x="350" y="150" width="60" height="100" rx="10" />
    <line x1="380" y1="160" x2="380" y2="160" stroke-width="5" />
    <rect x="365" y1="180" width="30" height="50" stroke-width="1" stroke-opacity="0.5" />
    
    <!-- Laptop -->
    <path d="M700,200 L800,200 L830,230 L670,230 Z" />
    <rect x="700" y="150" width="100" height="50" />
    
    <!-- Circuit board pattern -->
    <g transform="translate(500, 400)" opacity="0.6">
      <path d="M0,0 L50,0 L50,50 L0,50 Z" />
      <path d="M0,0 L50,50" />
      <path d="M0,50 L50,0" />
      <circle cx="25" cy="25" r="10" />
      <line x1="0" y1="25" x2="50" y2="25" />
      <line x1="25" y1="0" x2="25" y2="50" />
    </g>
    
    <!-- Computer monitor -->
    <rect x="200" y="350" width="120" height="80" rx="5" />
    <path d="M240,430 L280,430 L290,450 L230,450 Z" />
  </g>
  
  <!-- Subtle grid pattern overlay -->
  <path d="M0,100 L1200,100 M0,200 L1200,200 M0,300 L1200,300 M0,400 L1200,400 M0,500 L1200,500 
           M100,0 L100,600 M200,0 L200,600 M300,0 L300,600 M400,0 L400,600 M500,0 L500,600 
           M600,0 L600,600 M700,0 L700,600 M800,0 L800,600 M900,0 L900,600 M1000,0 L1000,600 M1100,0 L1100,600" 
        stroke="white" stroke-width="0.5" opacity="0.1" />
  
  <!-- Small particles scattered throughout -->
  <g fill="white" opacity="0.6">
    <circle cx="150" cy="120" r="2" />
    <circle cx="320" cy="280" r="3" />
    <circle cx="480" cy="150" r="2" />
    <circle cx="580" cy="420" r="1" />
    <circle cx="750" cy="350" r="2" />
    <circle cx="850" cy="180" r="3" />
    <circle cx="950" cy="280" r="2" />
    <circle cx="1050" cy="450" r="3" />
    <circle cx="200" cy="480" r="1" />
    <circle cx="400" cy="520" r="2" />
    <circle cx="680" cy="80" r="2" />
    <circle cx="880" cy="520" r="1" />
    <circle cx="1000" cy="120" r="1" />
    <circle cx="1100" cy="320" r="2" />
  </g>
</svg>