<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular gradient background -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34A853" />
      <stop offset="100%" stop-color="#1E8E3E" />
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main circle with gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#bg-gradient)" filter="url(#drop-shadow)" />
  
  <!-- Recycling Symbol -->
  <g fill="white" transform="translate(50, 60) scale(0.8)">
    <!-- Arrow 1 -->
    <path d="M88,28 C81,16 69,8.5 55.5,8.5 C34.5,8.5 17.5,25.5 17.5,46.5 C17.5,48.9 17.8,51.2 18.3,53.5 L1.5,53.5 L20,82 L38.5,53.5 L23.7,53.5 C23.2,51.2 23,48.9 23,46.5 C23,28.5 37,14.5 55,14.5 C66,14.5 75.9,20.2 81.5,30 L88,28 Z" />
    <!-- Arrow 2 -->
    <path d="M82,59.5 C92,53.8 98,45.5 98,32.5 C98,11.5 81,0 60,0 C57.6,0 55.3,0.3 53,0.8 L53,-12 L24.5,6.5 L53,25 L53,10.2 C55.3,9.7 57.6,9.5 60,9.5 C78,9.5 92,16 92,32.5 C92,41.5 86.3,48.9 78,53.5 L82,59.5 Z" />
    <!-- Arrow 3 -->
    <path d="M30,108 C27,120 23,129 36,138 C57,147 74,134 87,119.5 C89.4,119.5 91.7,119.2 94,118.7 L94,135.5 L122.5,117 L94,98.5 L94,113.3 C91.7,113.8 89.4,114 87,114 C69,114 55,103.5 55,89 C55,82 58.7,75.9 65,71.5 L60,65 L30,108 Z" />
  </g>
  
  <!-- Text "ECYCLE" -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="white">ECYCLE</text>
</svg>